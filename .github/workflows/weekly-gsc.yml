name: Weekly GSC report

# Pulls Search Console data weekly and writes an action list (title fixes,
# near-page-1 wins, pages to build) to the run summary. Requires the
# GOOGLE_SERVICE_ACCOUNT_JSON secret (the SEO service account).

on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch: {}

jobs:
  gsc:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run GSC report
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SITE_URL: 'https://toolsbytask.com/'
        run: node scripts/gsc-report.mjs
